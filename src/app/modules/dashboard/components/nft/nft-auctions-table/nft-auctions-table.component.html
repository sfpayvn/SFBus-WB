<div class="bg-background flex-col rounded-lg px-8 py-8 sm:flex-row">
  <div class="mb-4 flex items-center justify-between">
    <div class="flex-col items-center">
      <h3 class="text-md text-foreground font-bold">Active Auctions</h3>
      <span class="text-muted-foreground text-xs">Updated 37 minutes ago</span>
    </div>
    <button
      class="bg-card text-muted-foreground hover:bg-muted hover:text-foreground flex-none rounded-md px-4 py-2.5 text-xs font-semibold">
      History
    </button>
  </div>

  <div class="relative overflow-x-auto">
    <table class="w-full table-auto">
      <!--Table head-->
      <thead class="text-muted-foreground text-xs uppercase">
        <tr>
          <th class="py-3 text-left">{{ 'table.headers.item' | translate }}</th>
          <th class="py-3 text-right">{{ 'table.headers.openPrice' | translate }}</th>
          <th class="py-3 text-right">{{ 'table.headers.price' | translate }}</th>
          <th class="py-3 text-right">{{ 'table.headers.recentOffer' | translate }}</th>
          <th class="py-3 text-right">{{ 'table.headers.timeLeft' | translate }}</th>
          <th class="py-3 text-right">{{ 'labels.view' | translate }}</th>
        </tr>
      </thead>
      <!--end Table head-->
      <!--Table body-->
      <tbody>
        <tr
          *ngFor="let auction of activeAuction"
          [auction]="auction"
          nft-auctions-table-item
          class="border-border hover:bg-card border-b border-dashed"></tr>
      </tbody>
      <!--end::Table body-->
    </table>
  </div>
</div>
