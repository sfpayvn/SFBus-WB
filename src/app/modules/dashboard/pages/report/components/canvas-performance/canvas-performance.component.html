<div class="relative h-64">
  @if (!isLoading && (!chartData || !chartData.datasets || chartData.datasets.length === 0 || !chartData.datasets[0] ||
  chartData.datasets[0].data.length === 0)) {
  <div class="absolute inset-0 flex items-center justify-center">
    <div class="text-center text-gray-400">
      <svg-icon
        class="flex items-center justify-center"
        src="assets/icons/heroicons/outline/chart-bar.svg"
        [svgClass]="'h-12 w-12 mb-2 text-gray-300 '"></svg-icon>
      <p class="text-sm">{{ 'common.noData' | translate }}</p>
    </div>
  </div>
  } @else { @if (isLoading) {
  <div class="absolute inset-0 z-10 flex h-full w-full items-center justify-center bg-opacity-75">
    <nz-spin [nzSize]="'large'" class="h-full w-full" [nzTip]="loadingTip"></nz-spin>
  </div>
  }
  <canvas
    baseChart
    [data]="displayChartData"
    [type]="chartType"
    [options]="{
      responsive: true,
      maintainAspectRatio: false,
      rotation: chartRotation,
      plugins: {
        legend: { display: true, position: 'bottom' }
      }
    }"></canvas>
  }
</div>
