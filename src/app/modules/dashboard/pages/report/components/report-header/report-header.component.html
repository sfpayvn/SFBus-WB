<div class="mb-6 rounded-lg bg-white p-6 shadow-sm">
  <div class="flex flex-col gap-4">
    <!-- Header -->
    <div class="flex items-center justify-between">
      <div>
        <h2 class="text-xl font-bold text-gray-800">{{ 'reportHeader.businessReport' | translate }}</h2>
        <p class="mt-1 text-sm text-gray-600">{{ 'reportHeader.dataAnalysis' | translate }}</p>
      </div>
      <div class="flex gap-2">
        <!-- Reload button -->
        <button nz-button nzType="default" (click)="onReload()" class="!flex !items-center !gap-2">
          <svg-icon src="assets/icons/heroicons/outline/arrow-path.svg" [svgClass]="'h-4 w-4'"></svg-icon>
          <span class="hidden sm:inline">{{ 'reportHeader.reload' | translate }}</span>
        </button>
        <!-- Export buttons -->
        <nz-dropdown [nzTrigger]="'click'">
          <button nz-button class="!flex !items-center !gap-2" nzType="default" nz-dropdown [nzDropdownMenu]="menu">
            <svg-icon src="assets/icons/heroicons/outline/arrow-down-tray.svg" [svgClass]="'h-4 w-4'"></svg-icon>
            <span class="hidden sm:inline">{{ 'reportHeader.exportReport' | translate }}</span>
          </button>
          <nz-dropdown-menu #menu="nzDropdownMenu">
            <ul nz-menu nzSelectable>
              <li nz-menu-item (click)="onExport('excel')">
                <svg-icon src="assets/icons/heroicons/outline/document.svg" [svgClass]="'h-4 w-4 mr-1'"></svg-icon>
                {{ 'reportHeader.exportExcel' | translate }}
              </li>
              <li nz-menu-item (click)="onExport('pdf')">
                <svg-icon src="assets/icons/heroicons/outline/document-text.svg" [svgClass]="'h-4 w-4 mr-1'"></svg-icon>
                {{ 'reportHeader.exportPdf' | translate }}
              </li>
            </ul>
          </nz-dropdown-menu>
        </nz-dropdown>
      </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-col items-start gap-3 border-t pt-3 sm:flex-row sm:items-center">
      <div class="flex w-full gap-4">
        <button
          nz-button
          [nzType]="comparisonMode ? 'primary' : 'default'"
          (click)="toggleComparisonMode()"
          class="!flex !items-center !gap-2">
          <svg-icon
            src="assets/icons/heroicons/outline/arrow-path-rounded-square.svg"
            [svgClass]="'h-4 w-4'"></svg-icon>
          <span>{{ 'reportHeader.comparison' | translate }}</span>
        </button>
        <!-- Date range buttons: today, this-week, this-month, last-7, last-30, custom -->
        <nz-button-group class="flex w-full">
          <button
            nz-button
            class="!flex !items-center !gap-2"
            [nzType]="dateRangeType === 'day' ? 'primary' : 'default'"
            (click)="setDateRangeType('day')">
            <svg-icon src="assets/icons/heroicons/outline/calendar-days.svg" [svgClass]="'h-4 w-4'"></svg-icon>
            <span>{{ 'reportHeader.today' | translate }}</span>
          </button>

          <button
            nz-button
            class="!flex !items-center !gap-2"
            [nzType]="dateRangeType === 'this-week' ? 'primary' : 'default'"
            (click)="setDateRangeType('this-week')">
            <svg-icon src="assets/icons/heroicons/outline/calendar.svg" [svgClass]="'h-4 w-4'"></svg-icon>
            <span>{{ 'reportHeader.thisWeek' | translate }}</span>
          </button>

          <button
            nz-button
            class="!flex !items-center !gap-2"
            [nzType]="dateRangeType === 'this-month' ? 'primary' : 'default'"
            (click)="setDateRangeType('this-month')">
            <svg-icon src="assets/icons/heroicons/outline/calendar-days.svg" [svgClass]="'h-4 w-4'"></svg-icon>
            <ion-icon name="calendar-number-outline" class="text-base"></ion-icon>
            <span>{{ 'reportHeader.thisMonth' | translate }}</span>
          </button>

          <button
            nz-button
            class="!flex !items-center !gap-2"
            [nzType]="dateRangeType === 'week' ? 'primary' : 'default'"
            (click)="setDateRangeType('week')">
            <svg-icon src="assets/icons/heroicons/outline/calendar.svg" [svgClass]="'h-4 w-4'"></svg-icon>
            <span>{{ 'reportHeader.last7Days' | translate }}</span>
          </button>

          <button
            nz-button
            class="!flex !items-center !gap-2"
            [nzType]="dateRangeType === 'month' ? 'primary' : 'default'"
            (click)="setDateRangeType('month')">
            <svg-icon src="assets/icons/heroicons/outline/calendar-days.svg" [svgClass]="'h-4 w-4'"></svg-icon>
            <span>{{ 'reportHeader.last30Days' | translate }}</span>
          </button>

          <button
            nz-button
            class="!flex !items-center !gap-2"
            [nzType]="dateRangeType === 'custom' ? 'primary' : 'default'"
            (click)="setDateRangeType('custom')">
            <svg-icon src="assets/icons/heroicons/outline/adjustments.svg" [svgClass]="'h-4 w-4'"></svg-icon>
            <span>{{ 'reportHeader.custom' | translate }}</span>
          </button>
        </nz-button-group>
      </div>
      <!-- Comparison mode toggle -->

      <!-- Date range picker -->
      <form [formGroup]="filterForm" class="flex flex-col items-center gap-3 sm:flex-row">
        <nz-range-picker
          formControlName="dateRange"
          [nzDisabledDate]="disabledDate"
          nzFormat="dd/MM/yyyy"
          [nzPlaceHolder]="[
            'reportHeader.dateRange.startDate' | translate,
            'reportHeader.dateRange.endDate' | translate
          ]"
          class="w-full sm:w-auto"></nz-range-picker>
        @if (comparisonMode) {
        <svg-icon src="assets/icons/heroicons/outline/arrows-right-left.svg" [svgClass]="'h-4 w-4'"></svg-icon>
        @if (dateRangeType === 'day') {
        <nz-date-picker
          formControlName="compareDateRange"
          [nzDisabledDate]="disabledCompareDate"
          nzFormat="dd/MM/yyyy"
          [nzPlaceHolder]="'reportHeader.dateRange.start' | translate"
          class="w-full sm:w-auto"></nz-date-picker>
        } @else {
        <nz-range-picker
          formControlName="compareDateRange"
          [nzDisabledDate]="disabledCompareDate"
          nzFormat="dd/MM/yyyy"
          [nzPlaceHolder]="['reportHeader.dateRange.from' | translate, 'reportHeader.dateRange.to' | translate]"
          class="w-full sm:w-auto"></nz-range-picker>
        } }
      </form>
    </div>
  </div>
</div>
