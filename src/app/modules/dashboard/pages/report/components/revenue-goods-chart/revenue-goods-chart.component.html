<div class="bg-white rounded-lg shadow-sm p-4">
  <div class="flex items-center justify-between mb-4">
  <h3 class="text-lg font-semibold text-gray-800 mb-4">{{ 'revenueGoodsChart.title' | translate }}</h3>
    <span (click)="viewDetail()" class="text-sm text-blue-600 underline cursor-pointer">{{ 'common.detail' | translate }}</span>
  </div>
  <app-canvas-chart
    [isLoading]="isLoading"
    [chartData]="chartData"
    [comparisonMode]="comparisonMode"
    [dateRangeType]="dateRangeType"
    [startDate]="startDate"
    [endDate]="endDate"
    chartType="line"
    [chartOptions]="chartOptions"
  [loadingTip]="'common.Loading' | translate"
  ></app-canvas-chart>
</div>
