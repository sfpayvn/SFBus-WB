<div
  class="bg-background shadow-xs flex max-w-lg flex-col items-center justify-center gap-2 rounded-lg p-8 text-center">
  <h1 class="text-foreground text-4xl font-bold">{{ 'errors.error500.title' | translate }}</h1>
  <p class="text-muted-foreground text-base">
    {{ 'errors.error500.description' | translate }}
  </p>
  <app-button (buttonClick)="goToHomePage()" impact="bold" tone="primary" shape="rounded" size="medium">
    {{ 'errors.error500.homepage' | translate }}
  </app-button>
  <svg-icon src="assets/illustrations/500.svg" svgClass="w-[300px] h-[300px] text-muted-foreground "> </svg-icon>
</div>
